<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>সমিতি হিসাব</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a6b3c">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="সমিতি">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Tiro+Bangla:ital@0;1&family=Noto+Sans+Bengali:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #1a6b3c;
    --green-light: #2a8a52;
    --green-pale: #e8f5ee;
    --gold: #c8922a;
    --gold-light: #f0c060;
    --red: #c0392b;
    --red-pale: #fdecea;
    --bg: #f4f7f5;
    --card: #ffffff;
    --text: #1a2e22;
    --muted: #6b8070;
    --border: #d0e0d8;
    --shadow: 0 2px 12px rgba(26,107,60,0.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans Bengali', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* --- LOGIN SCREEN --- */
  #login-screen {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #1a6b3c 0%, #0f4025 60%, #c8922a 100%);
  }
  .login-box {
    background: white;
    border-radius: 20px;
    padding: 40px 36px;
    width: 100%; max-width: 380px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    text-align: center;
  }
  .login-logo { font-family: 'Tiro Bangla', serif; font-size: 2.4rem; color: var(--green); margin-bottom: 4px; }
  .login-subtitle { color: var(--muted); font-size: 0.9rem; margin-bottom: 28px; }
  .login-tabs { display: flex; background: var(--bg); border-radius: 10px; padding: 4px; margin-bottom: 24px; }
  .login-tab {
    flex: 1; padding: 8px; border-radius: 8px; border: none;
    background: transparent; cursor: pointer; font-family: inherit;
    font-size: 0.9rem; color: var(--muted); transition: all 0.2s;
  }
  .login-tab.active { background: white; color: var(--green); font-weight: 700; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  .form-group { margin-bottom: 16px; text-align: left; }
  .form-group label { display: block; font-size: 0.85rem; color: var(--muted); margin-bottom: 6px; font-weight: 600; }
  .form-group input, .form-group select {
    width: 100%; padding: 11px 14px; border: 2px solid var(--border);
    border-radius: 10px; font-family: inherit; font-size: 0.95rem;
    color: var(--text); background: white; transition: border 0.2s;
    outline: none;
  }
  .form-group input:focus, .form-group select:focus { border-color: var(--green); }
  .btn-primary {
    width: 100%; padding: 13px; background: var(--green); color: white;
    border: none; border-radius: 10px; font-family: inherit; font-size: 1rem;
    font-weight: 700; cursor: pointer; transition: background 0.2s;
    margin-top: 4px;
  }
  .btn-primary:hover { background: var(--green-light); }
  .login-error { color: var(--red); font-size: 0.85rem; margin-top: 10px; display: none; }

  /* --- APP SHELL --- */
  #app { display: none; }
  .top-bar {
    background: var(--green);
    color: white;
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    position: sticky; top: 0; z-index: 100;
  }
  .top-bar-title { font-family: 'Tiro Bangla', serif; font-size: 1.3rem; }
  .top-bar-user { font-size: 0.82rem; opacity: 0.85; }
  .btn-logout {
    background: rgba(255,255,255,0.15); border: none; color: white;
    padding: 6px 14px; border-radius: 8px; cursor: pointer;
    font-family: inherit; font-size: 0.85rem;
  }
  .nav-tabs {
    display: flex; background: white; border-bottom: 2px solid var(--border);
    overflow-x: auto; gap: 0;
    position: sticky; top: 58px; z-index: 99;
  }
  .nav-tab {
    flex-shrink: 0; padding: 13px 20px; border: none; background: transparent;
    cursor: pointer; font-family: inherit; font-size: 0.9rem; color: var(--muted);
    border-bottom: 3px solid transparent; margin-bottom: -2px;
    transition: all 0.2s; font-weight: 600;
  }
  .nav-tab.active { color: var(--green); border-bottom-color: var(--green); }
  .main-content { padding: 20px; max-width: 900px; margin: 0 auto; }

  /* --- CARDS & GENERAL --- */
  .card {
    background: var(--card); border-radius: 14px;
    box-shadow: var(--shadow); padding: 20px; margin-bottom: 16px;
  }
  .card-title {
    font-size: 1rem; font-weight: 700; color: var(--green);
    margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
  }
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 16px; }
  .stat-box {
    background: white; border-radius: 12px; padding: 16px;
    box-shadow: var(--shadow); text-align: center;
    border-top: 4px solid var(--green);
  }
  .stat-box.red { border-top-color: var(--red); }
  .stat-box.gold { border-top-color: var(--gold); }
  .stat-val { font-size: 1.5rem; font-weight: 700; color: var(--green); }
  .stat-box.red .stat-val { color: var(--red); }
  .stat-box.gold .stat-val { color: var(--gold); }
  .stat-label { font-size: 0.78rem; color: var(--muted); margin-top: 4px; }
  .badge {
    display: inline-block; padding: 3px 10px; border-radius: 20px;
    font-size: 0.75rem; font-weight: 700;
  }
  .badge-green { background: var(--green-pale); color: var(--green); }
  .badge-red { background: var(--red-pale); color: var(--red); }
  .badge-gold { background: #fef9ec; color: var(--gold); }

  /* --- TABLE --- */
  .tbl { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
  .tbl th { background: var(--green-pale); color: var(--green); font-weight: 700; padding: 10px 12px; text-align: left; }
  .tbl td { padding: 10px 12px; border-bottom: 1px solid var(--border); }
  .tbl tr:last-child td { border-bottom: none; }
  .tbl tr:hover td { background: #f8fdf9; }

  /* --- FORMS --- */
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-inline { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
  .form-inline input, .form-inline select {
    flex: 1; min-width: 140px; padding: 9px 12px;
    border: 2px solid var(--border); border-radius: 8px;
    font-family: inherit; font-size: 0.9rem; outline: none;
  }
  .form-inline input:focus, .form-inline select:focus { border-color: var(--green); }
  .btn-sm {
    padding: 9px 18px; border: none; border-radius: 8px;
    cursor: pointer; font-family: inherit; font-size: 0.88rem; font-weight: 700;
    transition: all 0.18s;
  }
  .btn-green { background: var(--green); color: white; }
  .btn-green:hover { background: var(--green-light); }
  .btn-red { background: var(--red); color: white; }
  .btn-red:hover { opacity: 0.85; }
  .btn-gold { background: var(--gold); color: white; }
  .btn-gold:hover { opacity: 0.85; }
  .btn-outline { background: transparent; color: var(--green); border: 2px solid var(--green); }
  .btn-outline:hover { background: var(--green-pale); }

  /* --- MONTH GRID FOR CHANDA --- */
  .month-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; }
  .month-cell {
    padding: 7px 4px; border-radius: 8px; font-size: 0.75rem;
    text-align: center; cursor: pointer; border: 2px solid transparent;
    transition: all 0.18s; font-weight: 600;
  }
  .month-cell.paid { background: var(--green-pale); color: var(--green); border-color: var(--green); }
  .month-cell.unpaid { background: var(--red-pale); color: var(--red); border-color: #f5c6c2; }
  .month-cell:hover { transform: scale(1.05); }

  /* --- ALERTS --- */
  .alert { padding: 10px 14px; border-radius: 8px; margin-bottom: 12px; font-size: 0.88rem; }
  .alert-green { background: var(--green-pale); color: var(--green); }
  .alert-red { background: var(--red-pale); color: var(--red); }

  /* --- SECTION HEADERS --- */
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .section-header h2 { font-size: 1rem; font-weight: 700; color: var(--text); }

  /* member only */
  .my-info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .info-item { background: var(--bg); border-radius: 10px; padding: 14px; }
  .info-item label { font-size: 0.78rem; color: var(--muted); display: block; margin-bottom: 4px; }
  .info-item span { font-size: 1rem; font-weight: 700; color: var(--text); }

  /* modal */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200;
    display: flex; align-items: center; justify-content: center;
    display: none;
  }
  .modal-box {
    background: white; border-radius: 16px; padding: 28px; width: 90%; max-width: 420px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  }
  .modal-title { font-size: 1.1rem; font-weight: 700; color: var(--green); margin-bottom: 20px; }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
  .modal-actions button { flex: 1; }

  @media (max-width: 520px) {
    .form-row { grid-template-columns: 1fr; }
    .my-info-grid { grid-template-columns: 1fr; }
    .month-grid { grid-template-columns: repeat(4, 1fr); }
    .stats-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">সমিতি</div>
    <div class="login-subtitle">হিসাব ব্যবস্থাপনা সিস্টেম</div>
    <div class="login-tabs">
      <button class="login-tab active" onclick="setLoginTab('admin')">অ্যাডমিন</button>
      <button class="login-tab" onclick="setLoginTab('member')">সদস্য</button>
    </div>
    <div id="admin-form">
      <div class="form-group">
        <label>পাসওয়ার্ড</label>
        <input type="password" id="admin-pass" placeholder="অ্যাডমিন পাসওয়ার্ড" onkeydown="if(event.key==='Enter') adminLogin()">
      </div>
      <button class="btn-primary" onclick="adminLogin()">লগইন করুন</button>
      <div style="margin-top:10px;font-size:0.78rem;color:var(--muted)">ডিফল্ট পাসওয়ার্ড: <b>admin123</b></div>
    </div>
    <div id="member-form" style="display:none">
      <div class="form-group">
        <label>সদস্য নির্বাচন করুন</label>
        <select id="member-select"><option value="">-- সদস্য বেছে নিন --</option></select>
      </div>
      <div class="form-group">
        <label>পাসওয়ার্ড (মোবাইল নম্বর)</label>
        <input type="password" id="member-pass" placeholder="মোবাইল নম্বর দিন" onkeydown="if(event.key==='Enter') memberLogin()">
      </div>
      <button class="btn-primary" onclick="memberLogin()">লগইন করুন</button>
    </div>
    <div class="login-error" id="login-error">❌ পাসওয়ার্ড ভুল হয়েছে</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="top-bar">
    <div>
      <div class="top-bar-title">🌿 সমিতি হিসাব</div>
      <div class="top-bar-user" id="top-user-label"></div>
    </div>
    <button class="btn-logout" onclick="logout()">লগআউট</button>
    <button id="install-btn" onclick="installApp()" style="display:none;background:var(--gold);border:none;color:white;padding:6px 14px;border-radius:8px;cursor:pointer;font-family:inherit;font-size:0.85rem;margin-left:6px">📲 ইনস্টল</button>
  </div>

  <div class="nav-tabs" id="nav-tabs"></div>

  <div class="main-content" id="main-content"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal-box" id="modal-box"></div>
</div>

<script>
// ========== STATE ==========
let db = JSON.parse(localStorage.getItem('samiti_db') || 'null') || {
  adminPass: 'admin123',
  members: [],
  transactions: [],
  year: new Date().getFullYear()
};
let currentRole = null; // 'admin' or 'member'
let currentMemberId = null;
const MONTHS = ['জানু','ফেব্রু','মার্চ','এপ্রিল','মে','জুন','জুলাই','আগস্ট','সেপ্টে','অক্টো','নভে','ডিসে'];
const MONTHS_FULL = ['জানুয়ারি','ফেব্রুয়ারি','মার্চ','এপ্রিল','মে','জুন','জুলাই','আগস্ট','সেপ্টেম্বর','অক্টোবর','নভেম্বর','ডিসেম্বর'];

function save() { localStorage.setItem('samiti_db', JSON.stringify(db)); }

// ========== LOGIN ==========
function setLoginTab(tab) {
  document.querySelectorAll('.login-tab').forEach((t,i)=>t.classList.toggle('active', (i===0&&tab==='admin')||(i===1&&tab==='member')));
  document.getElementById('admin-form').style.display = tab==='admin'?'':'none';
  document.getElementById('member-form').style.display = tab==='member'?'':'none';
  populateMemberSelect();
}
function populateMemberSelect() {
  const sel = document.getElementById('member-select');
  sel.innerHTML = '<option value="">-- সদস্য বেছে নিন --</option>';
  db.members.forEach(m=>{ const o=document.createElement('option'); o.value=m.id; o.textContent=m.name; sel.appendChild(o); });
}
function adminLogin() {
  if(document.getElementById('admin-pass').value === db.adminPass) {
    currentRole='admin'; currentMemberId=null;
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').style.display='block';
    document.getElementById('top-user-label').textContent='অ্যাডমিন প্যানেল';
    renderAdminNav();
  } else showLoginError();
}
function memberLogin() {
  const id = document.getElementById('member-select').value;
  const pass = document.getElementById('member-pass').value;
  const m = db.members.find(x=>x.id==id);
  if(m && m.phone && pass === m.phone) {
    currentRole='member'; currentMemberId=m.id;
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').style.display='block';
    document.getElementById('top-user-label').textContent=m.name;
    renderMemberNav(m);
  } else showLoginError();
}
function showLoginError() {
  const el=document.getElementById('login-error'); el.style.display='block';
  setTimeout(()=>el.style.display='none',2500);
}
function logout() {
  currentRole=null; currentMemberId=null;
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('admin-pass').value='';
  document.getElementById('member-pass').value='';
}

// ========== NAV ==========
const ADMIN_TABS = [
  {id:'dashboard', label:'📊 ড্যাশবোর্ড'},
  {id:'members', label:'👥 সদস্য'},
  {id:'chanda', label:'💰 চাঁদা'},
  {id:'transactions', label:'📒 আয়-ব্যয়'},
  {id:'report', label:'📄 রিপোর্ট'},
  {id:'settings', label:'⚙️ সেটিং'},
];
let currentTab = 'dashboard';
function renderAdminNav() {
  const nav = document.getElementById('nav-tabs');
  nav.innerHTML = ADMIN_TABS.map(t=>`<button class="nav-tab ${t.id===currentTab?'active':''}" onclick="switchTab('${t.id}')">${t.label}</button>`).join('');
  renderTab(currentTab);
}
function renderMemberNav(m) {
  const nav = document.getElementById('nav-tabs');
  nav.innerHTML = `<button class="nav-tab active" onclick="renderMemberView()">📋 আমার তথ্য</button>
  <button class="nav-tab" onclick="renderMemberChanda()">💰 চাঁদার অবস্থা</button>
  <button class="nav-tab" onclick="renderMemberTransactions()">📒 হিসাব দেখুন</button>`;
  renderMemberView();
}
function switchTab(id) {
  currentTab=id;
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.nav-tab')[ADMIN_TABS.findIndex(x=>x.id===id)].classList.add('active');
  renderTab(id);
}
function renderTab(id) {
  const fns = {dashboard:renderDashboard,members:renderMembers,chanda:renderChanda,transactions:renderTransactions,report:renderReport,settings:renderSettings};
  fns[id]();
}

// ========== DASHBOARD ==========
function renderDashboard() {
  const yr = db.year;
  const totalMembers = db.members.length;
  const monthlyRate = db.members.reduce((s,m)=>s+(m.monthlyChanda||0),0);
  const chandaIncome = db.members.reduce((s,m)=>{
    const paid = (m.chanda||{})[yr]||{};
    return s + Object.values(paid).filter(v=>v).length * (m.monthlyChanda||0);
  },0);
  const income = db.transactions.filter(t=>t.type==='income' && t.year==yr).reduce((s,t)=>s+t.amount,0);
  const expense = db.transactions.filter(t=>t.type==='expense' && t.year==yr).reduce((s,t)=>s+t.amount,0);
  const total = chandaIncome + income - expense;

  const unpaidMembers = db.members.filter(m=>{
    const paid=(m.chanda||{})[yr]||{}; return Object.values(paid).some(v=>!v)||Object.keys(paid).length<12;
  });

  document.getElementById('main-content').innerHTML = `
  <div class="stats-grid">
    <div class="stat-box"><div class="stat-val">${totalMembers}</div><div class="stat-label">মোট সদস্য</div></div>
    <div class="stat-box"><div class="stat-val">৳${num(chandaIncome)}</div><div class="stat-label">${yr} চাঁদা আদায়</div></div>
    <div class="stat-box red"><div class="stat-val">৳${num(expense)}</div><div class="stat-label">মোট ব্যয়</div></div>
    <div class="stat-box gold"><div class="stat-val">৳${num(total)}</div><div class="stat-label">নেট ব্যালেন্স</div></div>
  </div>
  <div class="card">
    <div class="card-title">📅 ${yr} সালের মাসওয়ারি চাঁদার সারসংক্ষেপ</div>
    <div style="overflow-x:auto">
    <table class="tbl">
      <tr><th>মাস</th><th>আদায়</th><th>বকেয়া</th><th>সংগ্রহ</th></tr>
      ${MONTHS.map((mn,i)=>{
        let paid=0,unpaid=0;
        db.members.forEach(m=>{ const p=(m.chanda||{})[yr]||{}; if(p[i]) paid++; else unpaid++; });
        const amt=db.members.reduce((s,m)=>{ const p=(m.chanda||{})[yr]||{}; return s+(p[i]?(m.monthlyChanda||0):0);},0);
        return `<tr><td>${MONTHS_FULL[i]}</td><td><span class="badge badge-green">${paid} জন</span></td><td><span class="badge badge-red">${unpaid} জন</span></td><td>৳${num(amt)}</td></tr>`;
      }).join('')}
    </table></div>
  </div>
  ${unpaidMembers.length?`<div class="card">
    <div class="card-title">⚠️ বকেয়াদার সদস্য</div>
    ${unpaidMembers.slice(0,5).map(m=>`<div style="padding:8px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between">
      <span>${m.name}</span><span class="badge badge-red">বকেয়া আছে</span>
    </div>`).join('')}
  </div>`:''}`;
}

// ========== MEMBERS ==========
function renderMembers() {
  document.getElementById('main-content').innerHTML = `
  <div class="card">
    <div class="card-title">👥 নতুন সদস্য যোগ করুন</div>
    <div class="form-row" style="margin-bottom:10px">
      <div class="form-group" style="margin:0"><label>নাম</label><input id="m-name" placeholder="সদস্যের নাম"></div>
      <div class="form-group" style="margin:0"><label>মোবাইল (পাসওয়ার্ড)</label><input id="m-phone" placeholder="01XXXXXXXXX"></div>
    </div>
    <div class="form-row" style="margin-bottom:10px">
      <div class="form-group" style="margin:0"><label>মাসিক চাঁদা (৳)</label><input id="m-chanda" type="number" placeholder="500"></div>
      <div class="form-group" style="margin:0"><label>ঠিকানা</label><input id="m-addr" placeholder="ঠিকানা (ঐচ্ছিক)"></div>
    </div>
    <button class="btn-sm btn-green" onclick="addMember()">✅ সদস্য যোগ করুন</button>
  </div>
  <div class="card">
    <div class="section-header"><h2>সকল সদস্যের তালিকা (${db.members.length} জন)</h2></div>
    ${db.members.length===0?'<div style="color:var(--muted);text-align:center;padding:20px">কোনো সদস্য নেই</div>':
    `<div style="overflow-x:auto"><table class="tbl">
      <tr><th>#</th><th>নাম</th><th>মোবাইল</th><th>মাসিক চাঁদা</th><th>যোগদান</th><th>অ্যাকশন</th></tr>
      ${db.members.map((m,i)=>`<tr>
        <td>${i+1}</td><td><b>${m.name}</b></td><td>${m.phone}</td>
        <td>৳${num(m.monthlyChanda||0)}</td>
        <td>${m.joinDate||'-'}</td>
        <td><button class="btn-sm btn-red" style="padding:5px 10px" onclick="deleteMember('${m.id}')">🗑️</button>
        <button class="btn-sm btn-outline" style="padding:5px 10px;margin-left:4px" onclick="editMemberModal('${m.id}')">✏️</button></td>
      </tr>`).join('')}
    </table></div>`}
  </div>`;
}
function addMember() {
  const name=v('m-name'), phone=v('m-phone'), chanda=parseFloat(v('m-chanda')||0), addr=v('m-addr');
  if(!name||!phone) return alert('নাম ও মোবাইল নম্বর দিন');
  db.members.push({id:Date.now().toString(),name,phone,monthlyChanda:chanda,address:addr,joinDate:new Date().toLocaleDateString('bn-BD'),chanda:{}});
  save(); renderMembers();
}
function deleteMember(id) {
  if(!confirm('এই সদস্য মুছে ফেলবেন?')) return;
  db.members = db.members.filter(m=>m.id!==id); save(); renderMembers();
}
function editMemberModal(id) {
  const m = db.members.find(x=>x.id===id);
  showModal(`<div class="modal-title">✏️ সদস্য সম্পাদনা</div>
    <div class="form-group"><label>নাম</label><input id="em-name" value="${m.name}"></div>
    <div class="form-group"><label>মোবাইল</label><input id="em-phone" value="${m.phone}"></div>
    <div class="form-group"><label>মাসিক চাঁদা</label><input id="em-chanda" type="number" value="${m.monthlyChanda||0}"></div>
    <div class="modal-actions">
      <button class="btn-sm btn-outline" onclick="closeModal()">বাতিল</button>
      <button class="btn-sm btn-green" onclick="saveEditMember('${id}')">সেভ করুন</button>
    </div>`);
}
function saveEditMember(id) {
  const m = db.members.find(x=>x.id===id);
  m.name=v('em-name'); m.phone=v('em-phone'); m.monthlyChanda=parseFloat(v('em-chanda')||0);
  save(); closeModal(); renderMembers();
}

// ========== CHANDA ==========
function renderChanda() {
  const yr = db.year;
  document.getElementById('main-content').innerHTML = `
  <div class="card">
    <div class="card-title">💰 ${yr} সালের চাঁদার হিসাব — ক্লিক করে পরিবর্তন করুন</div>
    <div style="overflow-x:auto"><table class="tbl">
      <tr><th>সদস্য</th><th>মাসিক</th>${MONTHS.map(m=>`<th>${m}</th>`).join('')}<th>মোট</th></tr>
      ${db.members.map(m=>{
        const paid=(m.chanda||{})[yr]||{};
        const total=Object.values(paid).filter(v=>v).length*(m.monthlyChanda||0);
        return `<tr><td><b>${m.name}</b></td><td>৳${m.monthlyChanda||0}</td>
          ${MONTHS.map((_,i)=>`<td style="cursor:pointer" onclick="toggleChanda('${m.id}',${i})">
            ${paid[i]?'<span class="badge badge-green">✓</span>':'<span class="badge badge-red">✗</span>'}
          </td>`).join('')}
          <td><b>৳${num(total)}</b></td></tr>`;
      }).join('')}
    </table></div>
  </div>`;
}
function toggleChanda(memberId, monthIdx) {
  const m = db.members.find(x=>x.id===memberId);
  if(!m.chanda) m.chanda={};
  if(!m.chanda[db.year]) m.chanda[db.year]={};
  m.chanda[db.year][monthIdx] = !m.chanda[db.year][monthIdx];
  save(); renderChanda();
}

// ========== TRANSACTIONS ==========
function renderTransactions() {
  const yr = db.year;
  const txs = db.transactions.filter(t=>t.year==yr).sort((a,b)=>b.date.localeCompare(a.date));
  const income = txs.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const expense = txs.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  document.getElementById('main-content').innerHTML = `
  <div class="card">
    <div class="card-title">➕ নতুন লেনদেন যোগ করুন</div>
    <div class="form-inline">
      <select id="tx-type"><option value="income">আয়</option><option value="expense">ব্যয়</option></select>
      <input id="tx-desc" placeholder="বিবরণ (যেমন: ভাড়া, দান...)">
      <input id="tx-amount" type="number" placeholder="পরিমাণ (৳)">
      <input id="tx-date" type="date" value="${new Date().toISOString().split('T')[0]}">
      <button class="btn-sm btn-green" onclick="addTransaction()">যোগ করুন</button>
    </div>
  </div>
  <div class="stats-grid">
    <div class="stat-box"><div class="stat-val">৳${num(income)}</div><div class="stat-label">মোট আয় (${yr})</div></div>
    <div class="stat-box red"><div class="stat-val">৳${num(expense)}</div><div class="stat-label">মোট ব্যয় (${yr})</div></div>
    <div class="stat-box gold"><div class="stat-val">৳${num(income-expense)}</div><div class="stat-label">ব্যালেন্স</div></div>
  </div>
  <div class="card">
    <div class="card-title">📒 ${yr} সালের লেনদেন</div>
    ${txs.length===0?'<div style="color:var(--muted);text-align:center;padding:20px">কোনো লেনদেন নেই</div>':
    `<div style="overflow-x:auto"><table class="tbl">
      <tr><th>তারিখ</th><th>ধরন</th><th>বিবরণ</th><th>পরিমাণ</th><th></th></tr>
      ${txs.map(t=>`<tr>
        <td>${t.date}</td>
        <td>${t.type==='income'?'<span class="badge badge-green">আয়</span>':'<span class="badge badge-red">ব্যয়</span>'}</td>
        <td>${t.desc}</td>
        <td style="font-weight:700;color:${t.type==='income'?'var(--green)':'var(--red)'}">৳${num(t.amount)}</td>
        <td><button class="btn-sm btn-red" style="padding:4px 8px" onclick="deleteTransaction('${t.id}')">🗑️</button></td>
      </tr>`).join('')}
    </table></div>`}
  </div>`;
}
function addTransaction() {
  const type=v('tx-type'), desc=v('tx-desc'), amount=parseFloat(v('tx-amount')), date=v('tx-date');
  if(!desc||!amount||!date) return alert('সব তথ্য দিন');
  db.transactions.push({id:Date.now().toString(),type,desc,amount,date,year:db.year});
  save(); renderTransactions();
}
function deleteTransaction(id) {
  if(!confirm('এই লেনদেন মুছবেন?')) return;
  db.transactions=db.transactions.filter(t=>t.id!==id); save(); renderTransactions();
}

// ========== REPORT ==========
function renderReport() {
  const yr = db.year;
  const chandaIncome = db.members.reduce((s,m)=>{
    const paid=(m.chanda||{})[yr]||{};
    return s+Object.values(paid).filter(v=>v).length*(m.monthlyChanda||0);
  },0);
  const otherIncome = db.transactions.filter(t=>t.type==='income'&&t.year==yr).reduce((s,t)=>s+t.amount,0);
  const expense = db.transactions.filter(t=>t.type==='expense'&&t.year==yr).reduce((s,t)=>s+t.amount,0);
  const totalIncome = chandaIncome+otherIncome;

  const chandaPaid = db.members.map(m=>{
    const paid=(m.chanda||{})[yr]||{};
    const paidMonths=Object.values(paid).filter(v=>v).length;
    const unpaidMonths=12-paidMonths;
    return {name:m.name, paidMonths, unpaidMonths, total:paidMonths*(m.monthlyChanda||0), due:unpaidMonths*(m.monthlyChanda||0)};
  });

  document.getElementById('main-content').innerHTML = `
  <div class="card" style="text-align:center;border-top:4px solid var(--green)">
    <div style="font-family:'Tiro Bangla',serif;font-size:1.6rem;color:var(--green)">${yr} সালের বার্ষিক রিপোর্ট</div>
    <div style="color:var(--muted);font-size:0.85rem;margin-top:4px">সমিতি হিসাব ব্যবস্থাপনা সিস্টেম</div>
  </div>
  <div class="stats-grid">
    <div class="stat-box"><div class="stat-val">৳${num(chandaIncome)}</div><div class="stat-label">চাঁদা আদায়</div></div>
    <div class="stat-box"><div class="stat-val">৳${num(otherIncome)}</div><div class="stat-label">অন্যান্য আয়</div></div>
    <div class="stat-box red"><div class="stat-val">৳${num(expense)}</div><div class="stat-label">মোট ব্যয়</div></div>
    <div class="stat-box gold"><div class="stat-val">৳${num(totalIncome-expense)}</div><div class="stat-label">নেট ব্যালেন্স</div></div>
  </div>
  <div class="card">
    <div class="card-title">👥 সদস্যওয়ারি চাঁদার বিবরণ</div>
    <div style="overflow-x:auto"><table class="tbl">
      <tr><th>সদস্য</th><th>পরিশোধিত মাস</th><th>বকেয়া মাস</th><th>পরিশোধিত</th><th>বকেয়া</th></tr>
      ${chandaPaid.map(r=>`<tr>
        <td><b>${r.name}</b></td>
        <td><span class="badge badge-green">${r.paidMonths} মাস</span></td>
        <td><span class="badge ${r.unpaidMonths?'badge-red':'badge-green'}">${r.unpaidMonths} মাস</span></td>
        <td>৳${num(r.total)}</td>
        <td style="color:${r.due?'var(--red)':'var(--green)'}"><b>৳${num(r.due)}</b></td>
      </tr>`).join('')}
    </table></div>
  </div>
  <div class="card">
    <div class="card-title">📒 আয়-ব্যয়ের বিবরণ</div>
    <div style="overflow-x:auto"><table class="tbl">
      <tr><th>তারিখ</th><th>ধরন</th><th>বিবরণ</th><th>পরিমাণ</th></tr>
      <tr><td colspan="3"><b>চাঁদা থেকে আয়</b></td><td>৳${num(chandaIncome)}</td></tr>
      ${db.transactions.filter(t=>t.year==yr).sort((a,b)=>a.date.localeCompare(b.date)).map(t=>`<tr>
        <td>${t.date}</td>
        <td>${t.type==='income'?'<span class="badge badge-green">আয়</span>':'<span class="badge badge-red">ব্যয়</span>'}</td>
        <td>${t.desc}</td>
        <td>৳${num(t.amount)}</td>
      </tr>`).join('')}
      <tr style="background:var(--green-pale)"><td colspan="3"><b>মোট আয়</b></td><td><b>৳${num(totalIncome)}</b></td></tr>
      <tr style="background:var(--red-pale)"><td colspan="3"><b>মোট ব্যয়</b></td><td><b>৳${num(expense)}</b></td></tr>
      <tr style="background:#fef9ec"><td colspan="3"><b>নেট ব্যালেন্স</b></td><td><b>৳${num(totalIncome-expense)}</b></td></tr>
    </table></div>
  </div>
  <div style="text-align:center;margin-top:10px">
    <button class="btn-sm btn-green" onclick="window.print()">🖨️ প্রিন্ট করুন</button>
  </div>`;
}

// ========== SETTINGS ==========
function renderSettings() {
  document.getElementById('main-content').innerHTML = `
  <div class="card">
    <div class="card-title">⚙️ সাধারণ সেটিং</div>
    <div class="form-group"><label>বর্তমান বছর</label>
      <input id="s-year" type="number" value="${db.year}" style="max-width:150px">
    </div>
    <button class="btn-sm btn-green" onclick="saveSettings()">সেভ করুন</button>
  </div>
  <div class="card">
    <div class="card-title">🔒 অ্যাডমিন পাসওয়ার্ড পরিবর্তন</div>
    <div class="form-group"><label>নতুন পাসওয়ার্ড</label><input type="password" id="s-pass" placeholder="নতুন পাসওয়ার্ড"></div>
    <div class="form-group"><label>আবার দিন</label><input type="password" id="s-pass2" placeholder="পুনরায় পাসওয়ার্ড"></div>
    <button class="btn-sm btn-gold" onclick="changePass()">পাসওয়ার্ড পরিবর্তন করুন</button>
  </div>
  <div class="card" style="border-top:3px solid var(--red)">
    <div class="card-title" style="color:var(--red)">⚠️ ডেটা ব্যাকআপ ও রিসেট</div>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <button class="btn-sm btn-gold" onclick="exportData()">📤 ডেটা ডাউনলোড</button>
      <button class="btn-sm btn-outline" onclick="importData()">📥 ডেটা আমদানি</button>
      <button class="btn-sm btn-red" onclick="resetData()">🗑️ সব ডেটা মুছুন</button>
    </div>
    <input type="file" id="import-file" accept=".json" style="display:none" onchange="doImport(event)">
  </div>`;
}
function saveSettings() {
  db.year = parseInt(v('s-year')||new Date().getFullYear());
  save(); alert('সেভ হয়েছে!');
}
function changePass() {
  const p1=v('s-pass'), p2=v('s-pass2');
  if(!p1) return alert('পাসওয়ার্ড দিন');
  if(p1!==p2) return alert('পাসওয়ার্ড মিলছে না');
  db.adminPass=p1; save(); alert('পাসওয়ার্ড পরিবর্তন হয়েছে!');
}
function exportData() {
  const blob = new Blob([JSON.stringify(db,null,2)],{type:'application/json'});
  const a = document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download=`samiti-backup-${db.year}.json`; a.click();
}
function importData() { document.getElementById('import-file').click(); }
function doImport(e) {
  const file=e.target.files[0]; if(!file) return;
  const r=new FileReader(); r.onload=ev=>{ try{ db=JSON.parse(ev.target.result); save(); renderSettings(); alert('ডেটা আমদানি সফল!'); }catch(err){ alert('ফাইল ভুল'); } };
  r.readAsText(file);
}
function resetData() {
  if(!confirm('সব ডেটা মুছে যাবে! নিশ্চিত?')) return;
  if(!confirm('সত্যিই মুছে ফেলবেন?')) return;
  db={adminPass:'admin123',members:[],transactions:[],year:new Date().getFullYear()};
  save(); renderSettings(); alert('ডেটা মুছে গেছে');
}

// ========== MEMBER VIEW ==========

  const m=db.members.find(x=>x.id===currentMemberId);

  const paid=(m.chanda||{})[yr]||{};

  const paidAmt=paidCount*(m.monthlyChanda||0);

      <div class="info-item"><label>নাম</label><span>${m.name}</span></div>

    <div class="stat-box red"><div class="stat-val">৳${num(due)}</div><div class="stat-label">বকেয়া</div></div>
  </div>`;
}
function renderMemberChanda() {
  const m=db.members.find(x=>x.id===currentMemberId);

  const paid=(m.chanda||{})[yr]||{};
  setMemberNav(1);
  document.getElementById('main-content').innerHTML = `
  <div class="card">
    <div class="card-title">💰 ${yr} সালের চাঁদার অবস্থা</div>
    <div class="month-grid">
      ${MONTHS_FULL.map((mn,i)=>`<div class="month-cell ${paid[i]?'paid':'unpaid'}">
        <div>${mn}</div><div style="font-size:1rem">${paid[i]?'✓':'✗'}</div>
      </div>`).join('')}
    </div>
    <div style="margin-top:16px;display:flex;gap:10px">
      <span class="badge badge-green">✓ পরিশোধিত</span>
      <span class="badge badge-red">✗ বকেয়া</span>
    </div>
  </div>`;
}
function renderMemberTransactions() {
  const yr=db.year;
  const txs=db.transactions.filter(t=>t.year==yr).sort((a,b)=>b.date.localeCompare(a.date));
  const income=db.transactions.filter(t=>t.type==='income'&&t.year==yr).reduce((s,t)=>s+t.amount,0);
  const chandaIncome=db.members.reduce((s,m)=>{ const p=(m.chanda||{})[yr]||{}; return s+Object.values(p).filter(v=>v).length*(m.monthlyChanda||0);},0);
  const expense=db.transactions.filter(t=>t.type==='expense'&&t.year==yr).reduce((s,t)=>s+t.amount,0);
  setMemberNav(2);
  document.getElementById('main-content').innerHTML = `
  <div class="stats-grid">
    <div class="stat-box"><div class="stat-val">৳${num(chandaIncome+income)}</div><div class="stat-label">মোট আয়</div></div>
    <div class="stat-box red"><div class="stat-val">৳${num(expense)}</div><div class="stat-label">মোট ব্যয়</div></div>
    <div class="stat-box gold"><div class="stat-val">৳${num(chandaIncome+income-expense)}</div><div class="stat-label">ব্যালেন্স</div></div>
  </div>
  <div class="card">
    <div class="card-title">📒 ${yr} সালের হিসাব (শুধু দেখা)</div>
    ${txs.length===0?'<div style="color:var(--muted);text-align:center;padding:20px">কোনো লেনদেন নেই</div>':
    `<div style="overflow-x:auto"><table class="tbl">
      <tr><th>তারিখ</th><th>ধরন</th><th>বিবরণ</th><th>পরিমাণ</th></tr>
      ${txs.map(t=>`<tr>
        <td>${t.date}</td>
        <td>${t.type==='income'?'<span class="badge badge-green">আয়</span>':'<span class="badge badge-red">ব্যয়</span>'}</td>
        <td>${t.desc}</td>
        <td>৳${num(t.amount)}</td>
      </tr>`).join('')}
    </table></div>`}
  </div>`;
}
function setMemberNav(active) {
  document.querySelectorAll('.nav-tab').forEach((t,i)=>t.classList.toggle('active',i===active));
}

// ========== MODAL ==========
function showModal(html) {
  document.getElementById('modal-box').innerHTML=html;
  document.getElementById('modal').style.display='flex';
}
function closeModal() { document.getElementById('modal').style.display='none'; }
document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal();});

// ========== UTILS ==========
function v(id) { return (document.getElementById(id)||{}).value||''; }
function num(n) { return Number(n).toLocaleString('bn-BD'); }

// init
populateMemberSelect();

// PWA Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}

// Install prompt
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  const btn = document.getElementById('install-btn');
  if (btn) btn.style.display = 'flex';
});
window.addEventListener('appinstalled', () => {
  const btn = document.getElementById('install-btn');
  if (btn) btn.style.display = 'none';
});
function installApp() {
  if (deferredPrompt) { deferredPrompt.prompt(); deferredPrompt=null; }
}
</script>
